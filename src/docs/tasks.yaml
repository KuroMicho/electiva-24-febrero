paths:
  /tasks:
    get:
      tags:
        - Tasks
      summary: Obtener todas las tareas
      security:
        - bearerAuth: []
      responses:
        200:
          description: Lista de tareas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task" # Esquema
        401:
          $ref: "#/components/responses/UnauthorizedError"

    post:
      tags:
        - Tasks
      summary: Crear una nueva tarea
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Task"
      responses:
        201:
          description: Tarea creada
        401:
          $ref: "#/components/responses/UnauthorizedError"

components:
  schemas:
    Task:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          example: "Comprar café para la clase"
        completed:
          type: boolean
          example: false
  responses:
    UnauthorizedError:
      description: Token no proporcionado o inválido
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: "Not authorized"
